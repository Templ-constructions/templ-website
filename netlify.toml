[build]
  # No build step — this is a static site.
  publish = "."

[build.processing]
  skip_processing = false

# Long-cache the heavy, fingerprint-stable assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
